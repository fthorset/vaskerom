<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaskerom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 20px 24px;
      text-align: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 600; }
    header p  { font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }

    .sync-status {
      font-size: 0.75rem;
      margin-top: 6px;
      opacity: 0.6;
    }

    .container {
      max-width: 700px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; }
    .dot-free   { background: #27ae60; }
    .dot-booked { background: #e74c3c; }
    .dot-mine   { background: #2980b9; }

    .grid {
      display: grid;
      grid-template-columns: 60px 1fr 1fr;
      gap: 4px;
    }

    .grid-header {
      font-weight: 600;
      font-size: 0.85rem;
      text-align: center;
      padding: 10px 4px;
      background: #2c3e50;
      color: white;
      border-radius: 6px;
    }

    .time-label {
      font-size: 0.8rem;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      font-variant-numeric: tabular-nums;
    }

    .slot {
      padding: 10px 8px;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: opacity 0.15s, transform 0.1s;
      user-select: none;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slot:hover { opacity: 0.85; transform: scale(0.98); }
    .slot.free   { background: #eafaf1; color: #27ae60; border: 1.5px solid #a9dfbf; }
    .slot.booked { background: #fdecea; color: #c0392b; border: 1.5px solid #f1948a; cursor: default; }
    .slot.mine   { background: #ebf5fb; color: #1a6ea8; border: 1.5px solid #85c1e9; }
    .slot.past   { background: #f5f5f5; color: #bbb; border: 1.5px solid #e0e0e0; cursor: default; }

    .slot-name {
      font-size: 0.75rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 28px 24px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal h2 { font-size: 1.1rem; margin-bottom: 6px; }
    .modal p  { font-size: 0.85rem; color: #666; margin-bottom: 16px; }

    .modal input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 14px;
      outline: none;
    }
    .modal input:focus { border-color: #2980b9; }

    .modal-buttons { display: flex; gap: 10px; }
    .btn {
      flex: 1; padding: 10px;
      border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #2c3e50; color: white; }
    .btn-cancel  { background: #ecf0f1; color: #555; }
    .btn-danger  { background: #e74c3c; color: white; }

    .error-msg {
      color: #e74c3c; font-size: 0.8rem;
      margin-bottom: 10px; display: none;
    }

    .reset-note {
      text-align: center; font-size: 0.78rem;
      color: #999; margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Vaskerom</h1>
  <p id="date-display"></p>
  <p class="sync-status" id="sync-status">Kobler til…</p>
</header>

<div class="container">
  <div class="legend">
    <div class="legend-item"><div class="dot dot-free"></div> Ledig</div>
    <div class="legend-item"><div class="dot dot-booked"></div> Opptatt</div>
    <div class="legend-item"><div class="dot dot-mine"></div> Din booking</div>
  </div>

  <div class="grid" id="grid">
    <div class="grid-header" style="background:transparent"></div>
    <div class="grid-header">🫧 Vaskemaskin</div>
    <div class="grid-header">💨 Tørketrommel</div>
  </div>

  <p class="reset-note">Bookinger nullstilles automatisk ved midnatt.</p>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
    <div id="modal-book">
      <p class="error-msg" id="error-msg"></p>
      <input type="text" id="name-input" placeholder="Ditt navn (valgfritt)" maxlength="20" />
      <div class="modal-buttons">
        <button class="btn btn-cancel" onclick="closeModal()">Avbryt</button>
        <button class="btn btn-primary" onclick="confirmBook()">Book</button>
      </div>
    </div>
    <div id="modal-cancel" style="display:none">
      <div class="modal-buttons">
        <button class="btn btn-cancel" onclick="closeModal()">Lukk</button>
        <button class="btn btn-danger" onclick="confirmCancel()">Avbestill</button>
      </div>
    </div>
  </div>
</div>

<script>
  const DB = "https://vaskerom-4c062-default-rtdb.europe-west1.firebasedatabase.app";
  const HOURS = Array.from({length: 15}, (_, i) => i + 7); // 7–21
  const MACHINES = ["vaskemaskin", "tørketrommel"];
  const MAX_HOURS = 3;
  const TODAY = new Date().toISOString().slice(0, 10);

  // Session ID — identifies this browser tab
  let SESSION = sessionStorage.getItem("vsession");
  if (!SESSION) {
    SESSION = Math.random().toString(36).slice(2);
    sessionStorage.setItem("vsession", SESSION);
  }

  let state = { vaskemaskin: {}, "tørketrommel": {} };
  let pendingMachine = null, pendingHour = null;

  // ── Firebase REST helpers ──
  async function dbGet() {
    try {
      const res = await fetch(`${DB}/bookings/${TODAY}.json`);
      const data = await res.json();
      if (data) {
        state.vaskemaskin = data.vaskemaskin || {};
        state["tørketrommel"] = data["tørketrommel"] || {};
      } else {
        state = { vaskemaskin: {}, "tørketrommel": {} };
      }
      document.getElementById("sync-status").textContent = "✓ Synkronisert";
    } catch {
      document.getElementById("sync-status").textContent = "⚠ Feil — prøver igjen…";
    }
    render();
  }

  async function dbSet(machine, hour, value) {
    await fetch(`${DB}/bookings/${TODAY}/${machine}/${hour}.json`, {
      method: "PUT",
      body: JSON.stringify(value),
    });
  }

  async function dbDelete(machine, hour) {
    await fetch(`${DB}/bookings/${TODAY}/${machine}/${hour}.json`, {
      method: "DELETE",
    });
  }

  // ── Render ──
  function isPast(h) { return new Date().getHours() >= h + 1; }
  function isNow(h)  { return new Date().getHours() === h; }

  function render() {
    const grid = document.getElementById("grid");
    // Remove dynamic rows
    grid.querySelectorAll(".time-label, .slot").forEach(el => el.remove());

    for (const hour of HOURS) {
      const label = document.createElement("div");
      label.className = "time-label";
      label.textContent = `${hour}:00`;
      grid.appendChild(label);

      for (const machine of MACHINES) {
        const booking = state[machine][hour];
        const past = isPast(hour);
        const slot = document.createElement("div");
        slot.className = "slot";

        if (past) {
          slot.classList.add("past");
          slot.textContent = "–";
        } else if (booking) {
          const mine = booking.session === SESSION;
          slot.classList.add(mine ? "mine" : "booked");
          slot.innerHTML = `<span class="slot-name">${booking.name || (mine ? "Deg" : "Opptatt")}</span>`;
          if (mine) {
            slot.title = "Klikk for å avbestille";
            slot.onclick = () => openCancel(machine, hour, booking.name);
          }
        } else {
          slot.classList.add("free");
          slot.textContent = isNow(hour) ? "Ledig nå" : "Ledig";
          slot.onclick = () => openBook(machine, hour);
        }
        grid.appendChild(slot);
      }
    }
  }

  // ── Modal ──
  function openBook(machine, hour) {
    pendingMachine = machine; pendingHour = hour;
    document.getElementById("modal-title").textContent =
      `Book ${machine === "vaskemaskin" ? "vaskemaskin" : "tørketrommel"}`;
    document.getElementById("modal-desc").textContent = `Kl. ${hour}:00 – ${hour + 1}:00`;
    document.getElementById("name-input").value = "";
    document.getElementById("error-msg").style.display = "none";
    document.getElementById("modal-book").style.display = "block";
    document.getElementById("modal-cancel").style.display = "none";
    document.getElementById("overlay").classList.add("active");
    setTimeout(() => document.getElementById("name-input").focus(), 100);
  }

  function openCancel(machine, hour, name) {
    pendingMachine = machine; pendingHour = hour;
    document.getElementById("modal-title").textContent =
      `${machine === "vaskemaskin" ? "Vaskemaskin" : "Tørketrommel"} – kl. ${hour}:00`;
    document.getElementById("modal-desc").textContent = name ? `Booket av: ${name}` : "Din booking";
    document.getElementById("modal-book").style.display = "none";
    document.getElementById("modal-cancel").style.display = "block";
    document.getElementById("overlay").classList.add("active");
  }

  function closeModal() {
    document.getElementById("overlay").classList.remove("active");
    pendingMachine = null; pendingHour = null;
  }

  async function confirmBook() {
    const name = document.getElementById("name-input").value.trim();

    // Validate max 3 consecutive hours
    const myHours = Object.entries(state[pendingMachine])
      .filter(([, b]) => b.session === SESSION)
      .map(([h]) => parseInt(h));

    const all = [...myHours, pendingHour].sort((a, b) => a - b);
    let max = 1, cur = 1;
    for (let i = 1; i < all.length; i++) {
      cur = all[i] === all[i-1] + 1 ? cur + 1 : 1;
      max = Math.max(max, cur);
    }

    if (max > MAX_HOURS) {
      const err = document.getElementById("error-msg");
      err.textContent = `Maks ${MAX_HOURS} timer sammenhengende.`;
      err.style.display = "block";
      return;
    }

    const booking = { name: name || null, session: SESSION };
    state[pendingMachine][pendingHour] = booking;
    closeModal();
    render();
    await dbSet(pendingMachine, pendingHour, booking);
    await dbGet();
  }

  async function confirmCancel() {
    const m = pendingMachine, h = pendingHour;
    delete state[m][h];
    closeModal();
    render();
    await dbDelete(m, h);
    await dbGet();
  }

  // Close on backdrop click
  document.getElementById("overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("overlay")) closeModal();
  });
  document.getElementById("name-input").addEventListener("keydown", e => {
    if (e.key === "Enter") confirmBook();
  });

  // Date header
  const days = ["søndag","mandag","tirsdag","onsdag","torsdag","fredag","lørdag"];
  const months = ["januar","februar","mars","april","mai","juni","juli","august","september","oktober","november","desember"];
  const now = new Date();
  document.getElementById("date-display").textContent =
    `${days[now.getDay()]} ${now.getDate()}. ${months[now.getMonth()]} ${now.getFullYear()}`;

  // Poll every 5 seconds for live updates
  dbGet();
  setInterval(dbGet, 5000);
  setInterval(render, 60000); // update past-slots
</script>
</body>
</html>

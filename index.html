<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaskerom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 20px 24px;
      text-align: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 600; }
    header p  { font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }

    .sync-status {
      font-size: 0.75rem;
      margin-top: 6px;
      opacity: 0.6;
    }

    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 12px;
    }
    .nav-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 1.2rem;
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.25); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    #nav-label { font-size: 0.9rem; min-width: 160px; text-align: center; }

    /* Two-column layout */
    .main-layout {
      display: flex;
      gap: 24px;
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
      align-items: flex-start;
    }

    .booking-section {
      flex: 1;
      min-width: 0;
    }

    .chat-section {
      width: 320px;
      flex-shrink: 0;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    @media (max-width: 750px) {
      .main-layout { flex-direction: column; }
      .chat-section { width: 100%; }
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; }
    .dot-free   { background: #27ae60; }
    .dot-booked { background: #e74c3c; }
    .dot-mine   { background: #2980b9; }

    .grid {
      display: grid;
      grid-template-columns: 60px 1fr 1fr;
      gap: 4px;
    }

    .grid-header {
      font-weight: 600;
      font-size: 0.85rem;
      text-align: center;
      padding: 10px 4px;
      background: #2c3e50;
      color: white;
      border-radius: 6px;
    }

    .time-label {
      font-size: 0.8rem;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      font-variant-numeric: tabular-nums;
    }

    .slot {
      padding: 10px 8px;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: opacity 0.15s, transform 0.1s;
      user-select: none;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slot:hover { opacity: 0.85; transform: scale(0.98); }
    .slot.free   { background: #eafaf1; color: #27ae60; border: 1.5px solid #a9dfbf; }
    .slot.booked { background: #fdecea; color: #c0392b; border: 1.5px solid #f1948a; cursor: default; }
    .slot.mine   { background: #ebf5fb; color: #1a6ea8; border: 1.5px solid #85c1e9; }
    .slot.past   { background: #f5f5f5; color: #bbb; border: 1.5px solid #e0e0e0; cursor: default; }

    .slot-name {
      font-size: 0.75rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    /* Modal */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 28px 24px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal h2 { font-size: 1.1rem; margin-bottom: 6px; }
    .modal p  { font-size: 0.85rem; color: #666; margin-bottom: 16px; }

    .modal input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 14px;
      outline: none;
    }
    .modal input:focus { border-color: #2980b9; }

    .modal-buttons { display: flex; gap: 10px; }
    .btn {
      flex: 1; padding: 10px;
      border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #2c3e50; color: white; }
    .btn-cancel  { background: #ecf0f1; color: #555; }
    .btn-danger  { background: #e74c3c; color: white; }

    .error-msg {
      color: #e74c3c; font-size: 0.8rem;
      margin-bottom: 10px; display: none;
    }

    .reset-note {
      text-align: center; font-size: 0.78rem;
      color: #999; margin-top: 20px;
    }

    /* Chat */
    .chat-header {
      background: #2c3e50;
      color: white;
      padding: 14px 16px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 420px;
      min-height: 200px;
    }

    .chat-message {
      background: #f7f8fa;
      border-radius: 8px;
      padding: 10px 12px;
      border-left: 3px solid #2c3e50;
    }

    .chat-message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .chat-name {
      font-weight: 600;
      font-size: 0.85rem;
      color: #2c3e50;
    }

    .chat-time {
      font-size: 0.72rem;
      color: #aaa;
    }

    .chat-text {
      font-size: 0.85rem;
      color: #333;
      line-height: 1.6;
      word-break: break-word;
      white-space: normal;
    }

    .chat-empty {
      text-align: center;
      color: #bbb;
      font-size: 0.85rem;
      margin: auto;
      padding: 20px 0;
    }

    .chat-form {
      padding: 12px;
      border-top: 1px solid #eee;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-form input,
    .chat-form textarea {
      width: 100%;
      padding: 9px 11px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      resize: none;
    }
    .chat-form input:focus,
    .chat-form textarea:focus { border-color: #2980b9; }

    .chat-form textarea { min-height: 64px; }

    .chat-send-btn {
      align-self: flex-end;
      padding: 8px 20px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .chat-send-btn:hover { opacity: 0.85; }
    .chat-send-btn:disabled { opacity: 0.4; cursor: default; }

    /* Admin */
    .chat-header { display: flex; align-items: center; justify-content: space-between; }
    .admin-badge {
      font-size: 0.7rem; background: #e74c3c;
      color: white; padding: 2px 8px; border-radius: 10px;
      cursor: pointer;
    }

    .admin-actions {
      display: flex; gap: 6px; margin-top: 6px;
    }
    .admin-btn {
      font-size: 0.75rem; padding: 3px 8px;
      border: none; border-radius: 6px;
      cursor: pointer; transition: opacity 0.15s;
      font-family: inherit;
    }
    .admin-btn:hover { opacity: 0.8; }
    .admin-delete { background: #fdecea; color: #c0392b; }
    .admin-reply  { background: #eafaf1; color: #1a7a40; }

    .chat-reply {
      margin-top: 8px;
      margin-left: 12px;
      padding: 8px 10px;
      background: #eef2f7;
      border-left: 3px solid #2980b9;
      border-radius: 6px;
    }
    .chat-reply .chat-name { color: #2980b9; font-size: 0.8rem; }
    .chat-reply .chat-text { font-size: 0.82rem; }
    .chat-reply .chat-time { font-size: 0.7rem; }

    /* Admin login modal */
    .admin-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 200;
      align-items: center; justify-content: center;
    }
    .admin-overlay.active { display: flex; }
    .admin-modal {
      background: white; border-radius: 12px;
      padding: 28px 24px; width: 90%; max-width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .admin-modal h2 { font-size: 1.1rem; margin-bottom: 16px; }
    .admin-modal input {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 0.95rem; margin-bottom: 10px; outline: none;
      font-family: inherit;
    }
    .admin-modal input:focus { border-color: #2980b9; }
    .admin-error { color: #e74c3c; font-size: 0.8rem; margin-bottom: 10px; display: none; }

    /* Reply form */
    .reply-form {
      margin-top: 8px; display: none; flex-direction: column; gap: 6px;
    }
    .reply-form.open { display: flex; }
    .reply-form textarea {
      width: 100%; padding: 7px 10px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 0.82rem; font-family: inherit;
      outline: none; resize: none; min-height: 52px;
    }
    .reply-form textarea:focus { border-color: #2980b9; }
    .reply-send-btn {
      align-self: flex-end; padding: 5px 14px;
      background: #2c3e50; color: white;
      border: none; border-radius: 6px;
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>Vaskerom</h1>
  <p id="date-display"></p>
  <p class="sync-status" id="sync-status">Kobler til…</p>
  <div class="date-nav">
    <button class="nav-btn" id="prev-btn" onclick="changeDay(-1)">&#8592;</button>
    <span id="nav-label"></span>
    <button class="nav-btn" id="next-btn" onclick="changeDay(1)">&#8594;</button>
  </div>
</header>

<div class="main-layout">

  <!-- Booking -->
  <div class="booking-section">
    <div class="legend">
      <div class="legend-item"><div class="dot dot-free"></div> Ledig</div>
      <div class="legend-item"><div class="dot dot-booked"></div> Opptatt</div>
      <div class="legend-item"><div class="dot dot-mine"></div> Din booking</div>
    </div>

    <div class="grid" id="grid">
      <div class="grid-header" style="background:transparent"></div>
      <div class="grid-header">🫧 Vaskemaskin</div>
      <div class="grid-header">💨 Tørketrommel</div>
    </div>

    <p class="reset-note">Bookinger nullstilles automatisk ved midnatt.</p>
  </div>

  <!-- Chat -->
  <div class="chat-section">
    <div class="chat-header">
      <span>💬 Oppslagstavle</span>
      <span id="admin-badge" style="display:none" class="admin-badge" onclick="adminLogout()">Admin ✕</span>
    </div>
    <div class="chat-messages" id="chat-messages">
      <p class="chat-empty">Ingen meldinger ennå.</p>
    </div>
    <div class="chat-form">
      <input type="text" id="chat-name" placeholder="Ditt navn" maxlength="20" />
      <textarea id="chat-text" placeholder="Skriv en melding…" maxlength="300"></textarea>
      <button class="chat-send-btn" id="chat-send-btn" onclick="sendChat()">Send</button>
    </div>
  </div>

</div>

<!-- Admin login modal -->
<div class="admin-overlay" id="admin-overlay">
  <div class="admin-modal">
    <h2>🔐 Admin-innlogging</h2>
    <p class="admin-error" id="admin-error">Feil passord.</p>
    <input type="password" id="admin-pw-input" placeholder="Passord" />
    <div class="modal-buttons">
      <button class="btn btn-cancel" onclick="closeAdminLogin()">Avbryt</button>
      <button class="btn btn-primary" onclick="submitAdminLogin()">Logg inn</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
    <div id="modal-book">
      <p class="error-msg" id="error-msg"></p>
      <input type="text" id="name-input" placeholder="Ditt navn (valgfritt)" maxlength="20" />
      <div class="modal-buttons">
        <button class="btn btn-cancel" onclick="closeModal()">Avbryt</button>
        <button class="btn btn-primary" onclick="confirmBook()">Book</button>
      </div>
    </div>
    <div id="modal-cancel" style="display:none">
      <div class="modal-buttons">
        <button class="btn btn-cancel" onclick="closeModal()">Lukk</button>
        <button class="btn btn-danger" onclick="confirmCancel()">Avbestill</button>
      </div>
    </div>
  </div>
</div>

<script>
  const DB = "https://vaskerom-4c062-default-rtdb.europe-west1.firebasedatabase.app";
  const ADMIN_PW = "dahlsogdamer";

  // ── Admin ──
  let isAdmin = sessionStorage.getItem("admin") === "1";

  // Hidden trigger: klikk på tittelen 5 ganger
  let adminClicks = 0, adminTimer = null;
  document.querySelector("header h1").style.cursor = "default";
  document.querySelector("header h1").addEventListener("click", () => {
    adminClicks++;
    clearTimeout(adminTimer);
    adminTimer = setTimeout(() => adminClicks = 0, 2000);
    if (adminClicks >= 5) { adminClicks = 0; openAdminLogin(); }
  });

  function openAdminLogin() {
    document.getElementById("admin-pw-input").value = "";
    document.getElementById("admin-error").style.display = "none";
    document.getElementById("admin-overlay").classList.add("active");
    setTimeout(() => document.getElementById("admin-pw-input").focus(), 100);
  }

  function closeAdminLogin() {
    document.getElementById("admin-overlay").classList.remove("active");
  }

  function submitAdminLogin() {
    const pw = document.getElementById("admin-pw-input").value;
    if (pw === ADMIN_PW) {
      isAdmin = true;
      sessionStorage.setItem("admin", "1");
      closeAdminLogin();
      document.getElementById("admin-badge").style.display = "inline";
      renderChat();
    } else {
      document.getElementById("admin-error").style.display = "block";
    }
  }

  function adminLogout() {
    isAdmin = false;
    sessionStorage.removeItem("admin");
    document.getElementById("admin-badge").style.display = "none";
    renderChat();
  }

  document.getElementById("admin-pw-input").addEventListener("keydown", e => {
    if (e.key === "Enter") submitAdminLogin();
  });

  if (isAdmin) document.getElementById("admin-badge").style.display = "inline";
  const HOURS = Array.from({length: 17}, (_, i) => i + 7); // 7–23
  const MACHINES = ["vaskemaskin", "tørketrommel"];
  const MAX_HOURS = 3;

  const days   = ["søndag","mandag","tirsdag","onsdag","torsdag","fredag","lørdag"];
  const months = ["januar","februar","mars","april","mai","juni","juli","august","september","oktober","november","desember"];

  let dayOffset = 0;

  function getDate(offset) {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return d;
  }

  function dateStr(offset) {
    return getDate(offset).toISOString().slice(0, 10);
  }

  function updateDateUI() {
    const d = getDate(dayOffset);
    const label = dayOffset === 0 ? "I dag" : dayOffset === 1 ? "I morgen" :
      `${days[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]}`;
    document.getElementById("nav-label").textContent = label;
    document.getElementById("date-display").textContent =
      `${days[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
    document.getElementById("prev-btn").disabled = dayOffset <= 0;
    document.getElementById("next-btn").disabled = dayOffset >= 7;
  }

  function changeDay(dir) {
    dayOffset = Math.max(0, Math.min(7, dayOffset + dir));
    updateDateUI();
    dbGet();
  }

  let SESSION = sessionStorage.getItem("vsession");
  if (!SESSION) {
    SESSION = Math.random().toString(36).slice(2);
    sessionStorage.setItem("vsession", SESSION);
  }

  let state = { vaskemaskin: {}, "tørketrommel": {} };
  let pendingMachine = null, pendingHour = null;

  function machineKey(machine) {
    return machine === "tørketrommel" ? "torketrommel" : machine;
  }

  // ── Booking Firebase ──
  async function dbGet() {
    try {
      const res = await fetch(`${DB}/bookings/${dateStr(dayOffset)}.json`);
      const data = await res.json();
      if (data) {
        state.vaskemaskin = data.vaskemaskin || {};
        state["tørketrommel"] = data.torketrommel || {};
      } else {
        state = { vaskemaskin: {}, "tørketrommel": {} };
      }
      document.getElementById("sync-status").textContent = "✓ Synkronisert";
    } catch {
      document.getElementById("sync-status").textContent = "⚠ Feil — prøver igjen…";
    }
    render();
  }

  async function dbSet(machine, hour, value) {
    await fetch(`${DB}/bookings/${dateStr(dayOffset)}/${machineKey(machine)}/${hour}.json`, {
      method: "PUT",
      body: JSON.stringify(value),
    });
  }

  async function dbDelete(machine, hour) {
    await fetch(`${DB}/bookings/${dateStr(dayOffset)}/${machineKey(machine)}/${hour}.json`, {
      method: "DELETE",
    });
  }

  // ── Chat Firebase ──
  let chatMessages = [];

  async function chatGet() {
    try {
      const res = await fetch(`${DB}/chat.json`);
      const data = await res.json();
      if (data) {
        chatMessages = Object.entries(data)
          .map(([key, val]) => ({ key, ...val }))
          .sort((a, b) => a.ts - b.ts);
      } else {
        chatMessages = [];
      }
      renderChat();
    } catch {
      // silent fail
    }
  }

  async function sendChat() {
    const name = document.getElementById("chat-name").value.trim();
    const text = document.getElementById("chat-text").value.trim();
    if (!name || !text) return;

    const btn = document.getElementById("chat-send-btn");
    btn.disabled = true;

    const msg = {
      name,
      text,
      ts: Date.now(),
    };

    try {
      await fetch(`${DB}/chat.json`, {
        method: "POST",
        body: JSON.stringify(msg),
      });
      document.getElementById("chat-text").value = "";
      await chatGet();
    } catch {
      // silent fail
    }

    btn.disabled = false;
  }

  function formatTime(ts) {
    const date = new Date(ts);
    const day = date.getDate();
    const month = months[date.getMonth()];
    const hh = String(date.getHours()).padStart(2, "0");
    const mm = String(date.getMinutes()).padStart(2, "0");
    return `${day}. ${month} ${hh}:${mm}`;
  }

  function renderChat() {
    const container = document.getElementById("chat-messages");

    // Skill ut toppnivå-meldinger og svar
    const topLevel = chatMessages.filter(m => !m.replyTo);
    const replies   = chatMessages.filter(m =>  m.replyTo);

    if (topLevel.length === 0) {
      container.innerHTML = '<p class="chat-empty">Ingen meldinger ennå.</p>';
      return;
    }

    container.innerHTML = topLevel.map(m => {
      const adminHtml = `
        <div class="admin-actions">
          <button class="admin-btn admin-reply" onclick="toggleReplyForm('${m.key}')">↩ Svar</button>
          ${isAdmin ? `<button class="admin-btn admin-delete" onclick="deleteMsg('${m.key}')">🗑 Slett</button>` : ""}
        </div>`;

      const replyList = replies.filter(r => r.replyTo === m.key).map(r => `
        <div class="chat-reply">
          <div class="chat-message-header">
            <span class="chat-name">Admin</span>
            <span class="chat-time">${formatTime(r.ts)}</span>
          </div>
          <div class="chat-text">${escHtml(r.text)}</div>
          ${isAdmin ? `<div class="admin-actions"><button class="admin-btn admin-delete" onclick="deleteMsg('${r.key}')">🗑 Slett</button></div>` : ""}
        </div>`).join("");

      return `
        <div class="chat-message" id="msg-${m.key}">
          <div class="chat-message-header">
            <span class="chat-name">${escHtml(m.name)}</span>
            <span class="chat-time">${formatTime(m.ts)}</span>
          </div>
          <div class="chat-text">${escHtml(m.text)}</div>
          ${adminHtml}
          ${replyList}
          <div class="reply-form" id="reply-form-${m.key}">
            <input type="text" placeholder="Ditt navn" maxlength="20" id="reply-name-${m.key}" style="padding:7px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:0.82rem;font-family:inherit;outline:none;margin-bottom:4px;width:100%;" />
            <textarea placeholder="Skriv svar…" maxlength="300" id="reply-text-${m.key}"></textarea>
            <button class="reply-send-btn" onclick="sendReply('${m.key}')">Send svar</button>
          </div>
        </div>`;
    }).join("");

    container.scrollTop = container.scrollHeight;
  }

  function toggleReplyForm(key) {
    const form = document.getElementById(`reply-form-${key}`);
    form.classList.toggle("open");
    if (form.classList.contains("open")) {
      document.getElementById(`reply-text-${key}`).focus();
    }
  }

  async function sendReply(parentKey) {
    const name = document.getElementById(`reply-name-${parentKey}`).value.trim();
    const text = document.getElementById(`reply-text-${parentKey}`).value.trim();
    if (!name || !text) return;
    const displayName = isAdmin ? `${name} (Admin)` : name;
    const msg = { name: displayName, text, ts: Date.now(), replyTo: parentKey };
    await fetch(`${DB}/chat.json`, { method: "POST", body: JSON.stringify(msg) });
    await chatGet();
  }

  async function deleteMsg(key) {
    if (!confirm("Slett denne meldingen?")) return;
    await fetch(`${DB}/chat/${key}.json`, { method: "DELETE" });
    await chatGet();
  }

  function escHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\n/g, "<br>")
      .replace(/•\s?/g, "• ");
  }

  // Send on Ctrl+Enter in textarea
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("chat-text").addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) sendChat();
    });
  });

  // ── Render booking ──
  function isPast(h) { return dayOffset === 0 && new Date().getHours() >= h + 1; }
  function isNow(h)  { return dayOffset === 0 && new Date().getHours() === h; }

  function render() {
    const grid = document.getElementById("grid");
    grid.querySelectorAll(".time-label, .slot").forEach(el => el.remove());

    for (const hour of HOURS) {
      const label = document.createElement("div");
      label.className = "time-label";
      label.textContent = `${hour}:00`;
      grid.appendChild(label);

      for (const machine of MACHINES) {
        const booking = state[machine][hour];
        const past = isPast(hour);
        const slot = document.createElement("div");
        slot.className = "slot";

        if (past) {
          slot.classList.add("past");
          slot.textContent = "–";
        } else if (booking) {
          const mine = booking.session === SESSION;
          slot.classList.add(mine ? "mine" : "booked");
          slot.innerHTML = `<span class="slot-name">${booking.name || (mine ? "Deg" : "Opptatt")}</span>`;
          if (mine) {
            slot.title = "Klikk for å avbestille";
            slot.onclick = () => openCancel(machine, hour, booking.name);
          }
        } else {
          slot.classList.add("free");
          slot.textContent = isNow(hour) ? "Ledig nå" : "Ledig";
          slot.onclick = () => openBook(machine, hour);
        }
        grid.appendChild(slot);
      }
    }
  }

  // ── Modal ──
  function openBook(machine, hour) {
    pendingMachine = machine; pendingHour = hour;
    document.getElementById("modal-title").textContent =
      `Book ${machine === "vaskemaskin" ? "vaskemaskin" : "tørketrommel"}`;
    document.getElementById("modal-desc").textContent = `Kl. ${hour}:00 – ${hour + 1}:00`;
    document.getElementById("name-input").value = "";
    document.getElementById("error-msg").style.display = "none";
    document.getElementById("modal-book").style.display = "block";
    document.getElementById("modal-cancel").style.display = "none";
    document.getElementById("overlay").classList.add("active");
    setTimeout(() => document.getElementById("name-input").focus(), 100);
  }

  function openCancel(machine, hour, name) {
    pendingMachine = machine; pendingHour = hour;
    document.getElementById("modal-title").textContent =
      `${machine === "vaskemaskin" ? "Vaskemaskin" : "Tørketrommel"} – kl. ${hour}:00`;
    document.getElementById("modal-desc").textContent = name ? `Booket av: ${name}` : "Din booking";
    document.getElementById("modal-book").style.display = "none";
    document.getElementById("modal-cancel").style.display = "block";
    document.getElementById("overlay").classList.add("active");
  }

  function closeModal() {
    document.getElementById("overlay").classList.remove("active");
    pendingMachine = null; pendingHour = null;
  }

  async function confirmBook() {
    const name = document.getElementById("name-input").value.trim();

    const myHours = Object.entries(state[pendingMachine])
      .filter(([, b]) => b.session === SESSION)
      .map(([h]) => parseInt(h));

    const all = [...myHours, pendingHour].sort((a, b) => a - b);
    let max = 1, cur = 1;
    for (let i = 1; i < all.length; i++) {
      cur = all[i] === all[i-1] + 1 ? cur + 1 : 1;
      max = Math.max(max, cur);
    }

    if (max > MAX_HOURS) {
      const err = document.getElementById("error-msg");
      err.textContent = `Maks ${MAX_HOURS} timer sammenhengende.`;
      err.style.display = "block";
      return;
    }

    const machine = pendingMachine;
    const hour = pendingHour;
    const booking = { name: name || null, session: SESSION };
    state[machine][hour] = booking;
    closeModal();
    render();
    await dbSet(machine, hour, booking);
  }

  async function confirmCancel() {
    const m = pendingMachine, h = pendingHour;
    delete state[m][h];
    closeModal();
    render();
    await dbDelete(m, h);
  }

  document.getElementById("overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("overlay")) closeModal();
  });
  document.getElementById("name-input").addEventListener("keydown", e => {
    if (e.key === "Enter") confirmBook();
  });

  // Init
  updateDateUI();
  dbGet();
  chatGet();
  setInterval(dbGet, 5000);
  setInterval(chatGet, 5000);
  setInterval(render, 60000);
</script>
</body>
</html>
